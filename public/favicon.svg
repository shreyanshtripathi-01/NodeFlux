<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#0b0d10"/>
  <!-- Central Line -->
  <path d="M50 25 V75" stroke="#f3f4f6" stroke-width="8" stroke-linecap="round"/>
  <!-- Top Left to Center -->
  <path d="M25 50 H50" stroke="#f3f4f6" stroke-width="8" stroke-linecap="round"/>
  <!-- Right to Center -->
  <path d="M75 50 H50" stroke="#f3f4f6" stroke-width="8" stroke-linecap="round"/>
  <!-- Nodes -->
  <circle cx="50" cy="25" r="10" fill="#f3f4f6"/>
  <circle cx="50" cy="75" r="10" fill="#f3f4f6"/>
  <circle cx="25" cy="50" r="10" fill="#f3f4f6"/>
  <circle cx="75" cy="50" r="10" fill="#f3f4f6"/>
  <circle cx="50" cy="50" r="12" fill="#4ade80"/>
</svg>
